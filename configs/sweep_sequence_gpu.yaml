# TokenScope — Sequence-length sweep for GPU (llama.cpp backend)
# Measures how per-token latency scales with prompt length on CUDA.
# Usage: make sweep-seq-gpu SYSTEM=X MODEL=/path/to/model.gguf

base:
  backend: llamacpp
  device: cuda
  model:
    id_or_path: /path/to/your/model.gguf
  generation:
    output_length: 64
    temperature: 0.0
    seed: 42
  benchmark:
    warmup_runs: 2
    trials: 5
    iqr_filter: true
    steady_state_skip: 2
  llamacpp:
    n_threads: 0
    n_gpu_layers: -1

sweep:
  generation.prompt_length:
    - 64
    - 128
    - 256
    - 512
    - 1024
