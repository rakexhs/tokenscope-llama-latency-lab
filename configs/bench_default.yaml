# TokenScope — Default benchmark configuration
# Usage: python -m bench.run_bench --config configs/bench_default.yaml

backend: hf          # hf | llamacpp
device: cpu          # cpu | cuda | mps

model:
  id_or_path: sshleifer/tiny-gpt2   # HF model ID or path to GGUF

generation:
  prompt_length: 128
  output_length: 128
  temperature: 0.0   # 0 = greedy
  top_p: 1.0
  seed: 42

benchmark:
  warmup_runs: 3
  trials: 10
  iqr_filter: true
  steady_state_skip: 2

# HuggingFace-specific
hf:
  mode: loop_decode   # loop_decode | generate
  dtype: auto          # auto | fp32 | fp16 | bf16

# llama.cpp-specific
llamacpp:
  kv_type_k: f16      # f16 | q8_0 | q4_0
  kv_type_v: f16
  n_threads: 0        # 0 = auto (os.cpu_count)
  n_gpu_layers: 0     # 0 = CPU only
