# TokenScope — Cross-platform device comparison example
# Run the same benchmark config on different devices.
# Usage: python -m bench.sweep --config configs/devices_example.yaml
#
# Adjust devices to match your hardware. Remove cuda/mps if unavailable.

base:
  backend: hf
  model:
    id_or_path: sshleifer/tiny-gpt2
  generation:
    prompt_length: 128
    output_length: 64
    temperature: 0.0
    seed: 42
  benchmark:
    warmup_runs: 3
    trials: 10
    iqr_filter: true
    steady_state_skip: 2
  hf:
    mode: loop_decode
    dtype: auto

sweep:
  device:
    - cpu
    # - cuda    # Uncomment if CUDA GPU available
    # - mps     # Uncomment on Apple Silicon
