# TokenScope — Sequence-length sweep
# Measures how per-token latency scales with prompt length.
# Usage: python -m bench.sweep --config configs/sweep_sequence.yaml

base:
  backend: hf
  device: cpu
  model:
    id_or_path: sshleifer/tiny-gpt2
  generation:
    output_length: 32
    temperature: 0.0
    seed: 42
  benchmark:
    warmup_runs: 2
    trials: 5
    iqr_filter: true
    steady_state_skip: 2
  hf:
    mode: loop_decode
    dtype: auto

sweep:
  generation.prompt_length:
    - 32
    - 64
    - 128
    - 256
    - 512
